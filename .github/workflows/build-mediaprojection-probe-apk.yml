name: Build MediaProjectionProbe APK

on:
  push:
    branches:
      - add-mediaprojection-probe-workflow
  workflow_dispatch:

jobs:
  build-mediaprojection-probe-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: MediaProjectionProbe
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaProjectionProbe-debug-apk
          path: MediaProjectionProbe/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
