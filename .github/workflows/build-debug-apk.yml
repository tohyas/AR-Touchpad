name: Build Debug APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename debug APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/DeskPad-v0.1.0-beta-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskPad-debug-apk
          path: app/build/outputs/apk/debug/DeskPad-v0.1.0-beta-debug.apk
          if-no-files-found: error
